title: VMaNGOS IP Lockout
id: 2105f482-1ff9-4657-b8ca-9868ee4ee649
status: experimental
description: El brute-force guard del realmd bloqueo una IP tras superar WrongPass.MaxAttempts - ataque sostenido confirmado por la propia defensa
references:
    - https://attack.mitre.org/techniques/T1110/001/
author: Jose Argento
date: 2026-07-05
logsource:
    product: vmangos
    service: realmd
detection:
    keywords:
        - 'is temporarily locked after'
    condition: keywords
falsepositives:
    - Jugador legitimo que olvido su contrasena e insistio hasta el bloqueo
level: high
tags:
    - attack.credential_access
    - attack.t1110.001
